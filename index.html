<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard - Real-Time Forecasts</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="grain-overlay"></div>
    
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1 class="logo">Weather<span class="logo-accent">Cast</span></h1>
                <p class="tagline">Real-time weather insights</p>
            </div>
            <button id="locationBtn" class="location-btn" title="Use current location">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                My Location
            </button>
        </header>

        <div class="search-container">
            <div class="search-wrapper">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Search for a city..."
                    autocomplete="off"
                >
            </div>
            <div id="suggestions" class="suggestions"></div>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div id="loadingSpinner" class="loading-spinner">
            <div class="spinner"></div>
            <p>Fetching weather data...</p>
        </div>

        <div id="weatherContent" class="weather-content">
            <!-- Current Weather Card -->
            <div class="current-weather-card">
                <div class="current-weather-header">
                    <div class="location-info">
                        <h2 id="cityName" class="city-name"></h2>
                        <p id="currentDate" class="current-date"></p>
                    </div>
                    <div id="weatherIcon" class="weather-icon-large"></div>
                </div>
                
                <div class="temperature-display">
                    <div class="temp-main">
                        <span id="currentTemp" class="current-temp"></span>
                        <span class="temp-unit">°C</span>
                    </div>
                    <p id="weatherDescription" class="weather-description"></p>
                </div>

                <div class="weather-details">
                    <div class="detail-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>
                        </svg>
                        <div class="detail-text">
                            <span class="detail-label">Feels Like</span>
                            <span id="feelsLike" class="detail-value"></span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19.07 4.93A10 10 0 0 0 6.99 3.34M12 10V2M12 22v-8M5 12H2M22 12h-3M17 17l2.83 2.83M7 7 4.17 4.17"></path>
                        </svg>
                        <div class="detail-text">
                            <span class="detail-label">Humidity</span>
                            <span id="humidity" class="detail-value"></span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"></path>
                        </svg>
                        <div class="detail-text">
                            <span class="detail-label">Wind Speed</span>
                            <span id="windSpeed" class="detail-value"></span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m5.08 5.08 4.24 4.24M1 12h6m6 0h6M4.22 19.78l4.24-4.24m5.08-5.08 4.24-4.24"></path>
                        </svg>
                        <div class="detail-text">
                            <span class="detail-label">Pressure</span>
                            <span id="pressure" class="detail-value"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 3-Day Forecast -->
            <div class="forecast-section">
                <h3 class="section-title">3-Day Forecast</h3>
                <div id="forecastCards" class="forecast-cards">
                    <!-- Forecast cards will be dynamically inserted here -->
                </div>
            </div>

            <!-- Additional Cities -->
            <div id="additionalCities" class="additional-cities">
                <!-- Additional city cards will be dynamically inserted here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
